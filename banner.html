<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>JWIC Consulting — LinkedIn Banner (1584×396)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* LinkedIn banner 1584×396 — ภาพพื้นหลัง + ชื่อแบรนด์มุมล่างขวา */
  :root { --teal-4: #7CCBC4; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; overflow: hidden; }
  body {
    font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
    color: #fff; position: relative;
    background: #061f22 url("img/why-business-analysis.jpg") center 42% / cover no-repeat;
  }
  /* เคลือบโทนแบรนด์ + ไล่มืดมุมล่างขวาให้ตัวหนังสืออ่านชัด */
  body::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 62% 130% at 90% 100%, rgba(4,22,25,.95) 0%, rgba(5,28,31,.75) 42%, transparent 72%),
      linear-gradient(to top, rgba(5,26,29,.72) 0%, rgba(6,33,36,.34) 45%, transparent 78%),
      linear-gradient(105deg, rgba(6,31,34,.86) 0%, rgba(7,45,48,.56) 44%, rgba(12,70,74,.34) 100%);
  }
  /* เส้นเน้นขอบล่างโทนไวน์ */
  body::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 5px;
    background: linear-gradient(90deg, #0D5257, #8B5697 52%, #A63A56);
  }

  .brand {
    position: absolute; z-index: 2; right: 70px; bottom: 42px;
    display: flex; align-items: center; gap: 14px;
  }
  .mark { width: 56px; height: 56px; flex-shrink: 0; filter: drop-shadow(0 12px 26px rgba(0,0,0,.6)); }
  .name {
    font-size: 27px; font-weight: 800; letter-spacing: -.01em; line-height: 1.05;
    text-shadow: 0 4px 22px rgba(0,0,0,.65);
  }
  .name i { font-style: normal; font-weight: 500; color: var(--teal-4); }
  .name small {
    display: block; margin-top: 6px;
    font-size: 15px; font-weight: 600; letter-spacing: .12em; color: #d7c6e4;
    text-shadow: 0 2px 12px rgba(0,0,0,.7);
  }
</style>
</head>
<body>

<div class="brand">
  <svg class="mark" viewBox="0 0 64 64" aria-label="JWIC Consulting">
    <defs><clipPath id="bl"><rect width="64" height="64" rx="10"/></clipPath></defs>
    <g clip-path="url(#bl)">
      <rect width="64" height="64" fill="#1c4a3c"/>
      <polygon points="42,0 42,22 64,22" fill="#000000" fill-opacity="0.16"/>
      <polygon points="64,0 42,0 64,22" fill="#c07f8b"/>
      <text x="32" y="43" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="27" font-weight="800" letter-spacing="-1.5" fill="#f5f1ea">JW</text>
    </g>
  </svg>
  <div class="name">www.jwicconsulting.com</div>
</div>

</body>
</html>
