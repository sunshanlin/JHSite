<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<title>JWIC Consulting — LinkedIn Banner (1584×396)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* LinkedIn banner 1584×396 — minimal: โลโก้ + tagline + เว็บ */
  :root { --plum: #CCA4CD; --teal-4: #7CCBC4; --h1: #072d30; --h3: #10535f; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; overflow: hidden; }
  body {
    font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
    color: #fff; position: relative;
    background:
      radial-gradient(circle at 74% 22%, rgba(166,58,86,.16), transparent 38%),
      radial-gradient(circle at 95% 92%, rgba(204,164,205,.13), transparent 42%),
      linear-gradient(118deg, #061f22 0%, var(--h1) 38%, #0a3e41 72%, var(--h3) 100%);
  }
  /* ตารางเส้นจาง ๆ แบบ hero ของเว็บ */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 64px 64px;
    -webkit-mask-image: linear-gradient(105deg, rgba(0,0,0,.55), transparent 60%);
    mask-image: linear-gradient(105deg, rgba(0,0,0,.55), transparent 60%);
  }
  /* วงแหวนบางตกแต่งขวาสุด */
  body::after {
    content: ""; position: absolute; right: -170px; top: -190px;
    width: 700px; height: 700px; border-radius: 50%;
    border: 1px solid rgba(124,203,196,.13);
    box-shadow: 0 0 0 70px rgba(124,203,196,.035);
  }

  .stack {
    position: absolute; z-index: 2; left: 452px; top: 50%; transform: translateY(-50%);
  }
  .brand-row { display: flex; align-items: center; gap: 20px; }
  .mark { width: 78px; height: 78px; flex-shrink: 0; filter: drop-shadow(0 12px 24px rgba(0,0,0,.45)); }
  .brand-name { font-size: 52px; font-weight: 800; letter-spacing: -.03em; line-height: 1; }
  .brand-name i { font-style: normal; font-weight: 500; color: var(--teal-4); }

  .rule { width: 74px; height: 3px; border-radius: 2px; margin: 26px 0 20px 98px;
          background: linear-gradient(90deg, #A63A56, #E08CA2); }

  .tagline {
    margin-left: 98px; font-size: 21px; font-weight: 600;
    letter-spacing: .1em; color: var(--plum);
  }
  .site {
    position: absolute; z-index: 2; right: 76px; bottom: 40px;
    font-size: 16px; font-weight: 700; letter-spacing: .04em; color: #b9d8d5;
  }
</style>
</head>
<body>

<div class="stack">
  <div class="brand-row">
    <svg class="mark" viewBox="0 0 64 64" aria-label="JWIC Consulting">
      <defs><clipPath id="bl"><rect width="64" height="64" rx="10"/></clipPath></defs>
      <g clip-path="url(#bl)">
        <rect width="64" height="64" fill="#1c4a3c"/>
        <polygon points="42,0 42,22 64,22" fill="#000000" fill-opacity="0.16"/>
        <polygon points="64,0 42,0 64,22" fill="#c07f8b"/>
        <text x="32" y="43" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="27" font-weight="800" letter-spacing="-1.5" fill="#f5f1ea">JW</text>
      </g>
    </svg>
    <span class="brand-name">JWIC <i>Consulting</i></span>
  </div>
  <div class="rule"></div>
  <div class="tagline">Honest Advice, Practical Solution</div>
</div>

<div class="site">www.jwicconsulting.com</div>

</body>
</html>
