<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#0D5257">
  <title>ไม่พบหน้าที่ต้องการ | JWIC Consulting</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Leelawadee UI", Tahoma, sans-serif;
      color: #122e33;
      background: #f2f9f7;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(620px, 100%);
      padding: clamp(32px, 7vw, 64px);
      text-align: center;
      background: #fff;
      border: 1px solid #bee3df;
      border-radius: 24px;
      box-shadow: 0 20px 60px -32px rgba(13, 82, 87, .4);
    }
    p:first-child {
      margin: 0;
      color: #1f7a87;
      font-size: clamp(64px, 18vw, 112px);
      font-weight: 800;
      line-height: 1;
    }
    h1 { margin: 18px 0 10px; color: #0d5257; }
    p { line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 22px;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      background: #0d5257;
      border-radius: 999px;
    }
    a:hover { background: #1f7a87; }
  </style>
</head>
<body>
  <main>
    <p aria-hidden="true">404</p>
    <h1>ไม่พบหน้าที่ต้องการ</h1>
    <p>ลิงก์นี้อาจถูกย้ายหรือพิมพ์ไม่ถูกต้อง กลับไปดูบริการ Business Central และ Thai Localization ได้ที่หน้าแรก</p>
    <a href="/">กลับหน้าแรก</a>
  </main>
</body>
</html>
